{% extends 'base.html' %}

{% block title %}Edit Comment - {{ site_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Edit Comment</h2>
            
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_content" class="form-label">Comment</label>
                            <textarea name="content" id="id_content" class="form-control" rows="5" required>{{ comment.content }}</textarea>
                            <small class="text-muted d-block mt-2">
                                Be respectful and constructive in your comments.
                            </small>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Save Changes
                            </button>
                            <a href="{{ comment.get_absolute_url }}" class="btn btn-secondary">
                                <i class="bi bi-x"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
